<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Guardian — Minimal Home Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

    /* Subtle ambient shadow (Cloud Shadow — almost invisible) */
    .editorial-shadow { box-shadow: 0 12px 32px rgba(45, 52, 51, 0.04); }

    /* Checkbox — pebble, never square corners */
    .check {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1.5px solid #adb3b2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background-color 0.18s ease, border-color 0.18s ease;
      background: transparent;
    }
    .check:hover { border-color: #4e6358; background: rgba(78, 99, 88, 0.06); }
    .check.done { border-color: #4e6358; background: #4e6358; }
    .check .material-symbols-outlined { font-size: 14px; color: #e6fdee; }

    .task-row { transition: background-color 0.15s ease; border-radius: 18px; }
    .task-row:hover { background: #f2f4f3; }
    .task-title.done { text-decoration: line-through; opacity: 0.45; }

    .nav-arrow {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #757c7b;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
      background: transparent;
      border: none;
    }
    .nav-arrow:hover:not(:disabled) { background: #ebeeed; color: #4e6358; }
    .nav-arrow:disabled { opacity: 0.25; cursor: default; }

    /* Subtle entrance for day-switch */
    .fade-in { animation: fadeIn 200ms ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Tonal section — "Reflection" space, deeper nest per No-Line rule */
    .tonal-low { background: #f2f4f3; border-radius: 24px; }

    /* Dark mode */
    html.dark { color-scheme: dark; }
    html.dark body { background: #0f1412; color: #e4e9e8; }
    html.dark .bg-background { background: #0f1412 !important; }
    html.dark .bg-surface { background: #0f1412 !important; }
    html.dark .bg-surface-container-low { background: #1a201e !important; }
    html.dark .bg-surface-container { background: #222826 !important; }
    html.dark .bg-surface-container-high { background: #2a302e !important; }
    html.dark .bg-surface-container-lowest { background: #1a201e !important; }
    html.dark .text-on-surface { color: #e4e9e8 !important; }
    html.dark .text-on-surface-variant { color: #adb3b2 !important; }
    html.dark .text-outline { color: #757c7b !important; }
    html.dark .text-outline-variant { color: #5a6060 !important; }
    html.dark .text-primary { color: #a8c4b5 !important; }
    html.dark .tonal-low { background: #1a201e; }
    html.dark .check { border-color: #5a6060; }
    html.dark .check:hover { border-color: #a8c4b5; background: rgba(168, 196, 181, 0.08); }
    html.dark .check.done { border-color: #a8c4b5; background: #4e6358; }
    html.dark .task-row:hover { background: #1a201e; }
    html.dark .nav-arrow { color: #adb3b2; }
    html.dark .nav-arrow:hover:not(:disabled) { background: #2a302e; color: #a8c4b5; }

    * { transition-property: background-color, color, opacity, border-color; transition-duration: 0.15s; }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        colors: {
          primary: '#4e6358', 'primary-dim': '#43574c', 'primary-container': '#d1e8da',
          'on-primary': '#e6fdee', 'on-surface': '#2d3433', 'on-surface-variant': '#5a6060',
          surface: '#f9f9f8', 'surface-container-low': '#f2f4f3', 'surface-container': '#ebeeed',
          'surface-container-lowest': '#ffffff', 'surface-container-high': '#e4e9e8',
          outline: '#757c7b', 'outline-variant': '#adb3b2', background: '#f9f9f8',
          tertiary: '#675e51', 'tertiary-container': '#faecdc',
          'on-tertiary-container': '#60574b', 'on-tertiary-fixed-variant': '#6b6155',
          error: '#9f403d',
        },
        fontFamily: { headline: ['Manrope'], body: ['Manrope'], label: ['Inter'] },
        borderRadius: { DEFAULT: '1rem', lg: '2rem' },
      }},
    };
  </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen">

  <!-- Toolbar (reference only — the real app has this from the app shell) -->
  <div class="fixed top-0 left-0 right-0 z-[100] px-6 py-3 flex items-center gap-3">
    <span class="text-xs font-label font-bold text-on-surface-variant uppercase tracking-widest opacity-60">Home</span>
    <div class="flex-1"></div>
    <button onclick="document.documentElement.classList.toggle('dark')" class="text-on-surface-variant hover:text-primary p-2 rounded-full hover:bg-surface-container">
      <span class="material-symbols-outlined text-xl">dark_mode</span>
    </button>
  </div>

  <!-- Sidebar (reference only) -->
  <aside class="fixed left-0 top-0 h-full w-[280px] bg-surface-container-low flex flex-col py-8 px-6 text-sm z-50">
    <div class="mb-10 px-4">
      <h1 class="text-xl font-bold text-on-surface">Focus Guardian</h1>
      <p class="text-[10px] text-outline-variant mt-1 uppercase tracking-[0.2em] font-semibold">Curated Sanctuary</p>
    </div>
    <nav class="flex-1 space-y-1">
      <p class="text-[10px] uppercase tracking-[0.2em] text-outline-variant px-4 mb-3 font-semibold">Your Goals</p>
      <button class="flex items-center gap-4 px-4 py-3 w-full rounded-full text-primary font-bold bg-surface editorial-shadow">
        <span class="material-symbols-outlined text-lg">home</span>
        <span>Home</span>
      </button>
      <button class="flex items-center gap-4 px-4 py-3 w-full rounded-full text-on-surface-variant hover:bg-surface-container">
        <span class="text-lg">🇬🇧</span><span>English</span>
      </button>
      <button class="flex items-center gap-4 px-4 py-3 w-full rounded-full text-on-surface-variant hover:bg-surface-container">
        <span class="text-lg">🎹</span><span>Piano</span>
      </button>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="ml-[280px] min-h-screen flex items-start justify-center pt-[18vh] pb-20 px-12">
    <div class="w-full max-w-[560px]">

      <!-- Hero: quiet date -->
      <section class="mb-20 text-center select-none">
        <p class="text-[10px] font-label font-bold text-outline uppercase tracking-[0.3em] mb-3" id="day-label">Today</p>
        <h1 id="date-hero" class="text-[2.75rem] leading-[1.05] font-headline font-extrabold tracking-[-0.02em] text-on-surface"></h1>
        <p class="text-sm text-on-surface-variant mt-3 font-light" id="greeting"></p>
      </section>

      <!-- Tasks list -->
      <section id="tasks-section" class="mb-16">
        <div class="flex items-baseline justify-between mb-6 px-1">
          <h2 class="text-[10px] font-label font-bold text-outline uppercase tracking-[0.3em]">The List</h2>
          <span id="done-count" class="text-[11px] font-label text-outline"></span>
        </div>
        <div id="tasks" class="space-y-0 fade-in"></div>
      </section>

      <!-- Subtle previous-day link (no book, just text navigation) -->
      <section class="flex items-center justify-between">
        <button id="btn-prev" class="nav-arrow" title="Previous day (←)">
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <p class="text-[10px] font-label text-outline uppercase tracking-[0.2em]" id="sub-footer">
          Use <kbd class="inline-block px-1.5 py-0.5 bg-surface-container-low rounded text-[10px] font-medium text-outline">←</kbd>
          <kbd class="inline-block px-1.5 py-0.5 bg-surface-container-low rounded text-[10px] font-medium text-outline">→</kbd>
          to browse past days
        </p>
        <button id="btn-next" class="nav-arrow" title="Next day (→)">
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </section>

    </div>
  </main>

  <script>
    // ── Sample data ──────────────────────────────────────────────────────────
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const taskSeeds = [
      { title: 'Morning meditation — 10 mins', goal: null, streak: 12 },
      { title: 'Duolingo German lesson', goal: '🇩🇪', streak: 9 },
      { title: 'Read 20 pages of current book', goal: '📚', streak: 4 },
      { title: 'Piano practice — 15 mins', goal: '🎹', streak: 3 },
      { title: 'Review Angular RFC for 30 mins', goal: '💻', streak: 0 },
    ];

    function makeDay(offset) {
      const d = new Date(today);
      d.setDate(today.getDate() + offset);
      return d;
    }
    function dateKey(d) { return d.toISOString().split('T')[0]; }
    function formatHero(d) {
      const weekday = d.toLocaleDateString('en-US', { weekday: 'long' });
      const date = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
      return `${weekday}, ${date}`;
    }
    function dayLabel(d) {
      const diff = Math.round((today - d) / 86400000);
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      return d.toLocaleDateString('en-US', { weekday: 'long' });
    }
    function greetingFor(d) {
      if (Math.round((today - d) / 86400000) !== 0) return '';
      const h = new Date().getHours();
      if (h < 12) return 'Good morning.';
      if (h < 17) return 'Good afternoon.';
      return 'Good evening.';
    }

    // Stateful store of tasks per date (so completions persist as we navigate)
    const store = new Map();
    function seedDay(d) {
      const key = dateKey(d);
      if (store.has(key)) return store.get(key);
      const isToday = Math.round((today - d) / 86400000) === 0;
      const tasks = taskSeeds.map((t, i) => ({
        id: `${key}-${i}`,
        title: t.title,
        goal: t.goal,
        streak: t.streak,
        // today: two done. past days: pseudo-random.
        done: isToday ? i < 2 : (((Math.abs(d.getDate()) + i) * 7) % 5) !== 0,
      }));
      store.set(key, tasks);
      return tasks;
    }

    // ── Render ──────────────────────────────────────────────────────────────
    let currentDate = new Date(today);

    function render() {
      const d = currentDate;
      const tasks = seedDay(d);
      const done = tasks.filter(t => t.done).length;
      const total = tasks.length;
      const isToday = Math.round((today - d) / 86400000) === 0;
      const isFuture = d > today;

      document.getElementById('day-label').textContent = dayLabel(d);
      document.getElementById('date-hero').textContent = formatHero(d);
      document.getElementById('greeting').textContent = greetingFor(d);
      document.getElementById('done-count').textContent =
        total === 0 ? '' : (done === total ? `All done — ${done}/${total}` : `${done} of ${total}`);

      // Nav buttons
      document.getElementById('btn-next').disabled = isToday; // Don't go into the future
      document.getElementById('btn-prev').disabled = false;   // Always allow going back

      const container = document.getElementById('tasks');
      container.classList.remove('fade-in');
      // Force a reflow so animation re-runs
      void container.offsetWidth;
      container.classList.add('fade-in');

      if (total === 0) {
        container.innerHTML = `
          <p class="text-center text-sm text-outline italic py-10">
            ${isToday ? 'Nothing on today&rsquo;s list.' : isFuture ? 'Tomorrow is yet to come.' : 'No tasks on this day.'}
          </p>
        `;
        return;
      }

      container.innerHTML = tasks.map(t => {
        const doneCls = t.done ? ' done' : '';
        const titleDoneCls = t.done ? ' done' : '';
        const streakHtml = t.streak > 0
          ? `<span class="flex items-center gap-1 text-[11px] font-label font-semibold ${t.done ? 'text-primary' : 'text-outline'} shrink-0">
              <span class="material-symbols-outlined filled" style="font-size:13px;">local_fire_department</span>${t.streak}
            </span>`
          : '';
        const goalHtml = t.goal
          ? `<span class="text-[14px] shrink-0 opacity-80">${t.goal}</span>`
          : '';
        return `
          <div class="task-row flex items-center gap-4 py-3 px-3 group">
            <button class="check${doneCls}" data-id="${t.id}" ${!isToday ? 'disabled' : ''}>
              ${t.done ? '<span class="material-symbols-outlined">check</span>' : ''}
            </button>
            <span class="task-title${titleDoneCls} flex-1 text-[15px] font-medium leading-snug text-on-surface">${t.title}</span>
            ${goalHtml}
            ${streakHtml}
          </div>
        `;
      }).join('');

      // Wire check toggles (today only)
      container.querySelectorAll('.check:not([disabled])').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-id');
          const dayKey = dateKey(currentDate);
          const tasks = store.get(dayKey);
          const task = tasks.find(t => t.id === id);
          if (!task) return;
          task.done = !task.done;
          render();
        });
      });
    }

    function go(delta) {
      const next = new Date(currentDate);
      next.setDate(currentDate.getDate() + delta);
      // Don't allow future beyond today
      if (next > today) return;
      currentDate = next;
      render();
    }

    document.getElementById('btn-prev').addEventListener('click', () => go(-1));
    document.getElementById('btn-next').addEventListener('click', () => go(1));
    document.addEventListener('keydown', (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
    });

    render();
  </script>
</body>
</html>
