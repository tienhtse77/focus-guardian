<main class="min-h-screen bg-[#faf9f7] flex">
  <!-- Sidebar -->
  <app-sidebar [goals]="goals()" [selectedGoalId]="selectedGoalId()" (goalSelected)="selectGoal($event)"
    (addGoalClicked)="openAddGoal()" (goalsReordered)="reorderGoals($event)" />

  <!-- Main Content -->
  <div class="flex-1 flex flex-col items-center justify-center px-8 relative">
    <!-- Header with Greeting and Theme Toggle -->
    <header class="absolute top-8 left-8 right-8 flex items-center justify-between">
      <div class="flex items-center gap-2 text-gray-500">
        <svg width="20" height="20" class="shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <span class="text-sm font-light">{{ greeting() }}</span>
      </div>

      <!-- Theme Toggle -->
      <button (click)="toggleTheme()" class="theme-toggle"
        [title]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
        @if (isDarkMode()) {
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        } @else {
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        }
      </button>
    </header>

    <!-- Goal Content or Empty State -->
    @if (selectedGoal()) {
    <app-goal-view [goal]="selectedGoal()!" (editClicked)="openEditGoal(selectedGoal()!)"
      (deleteClicked)="deleteGoal(selectedGoal()!.id)" />
    } @else {
    <div class="text-center">
      <h2 class="text-3xl font-serif text-gray-800 mb-4">Welcome to Focus Guardian</h2>
      <p class="text-gray-500 mb-8">Create your first goal to get started</p>
      <button (click)="openAddGoal()"
        class="px-6 py-3 bg-indigo-500 text-white rounded-xl hover:bg-indigo-600 transition-colors">
        Create Your First Goal
      </button>
    </div>
    }
  </div>

  <!-- Goal Form Modal -->
  @if (showGoalForm()) {
  <app-goal-form [goal]="editingGoal()" (save)="saveGoal($event)" (cancel)="closeGoalForm()" />
  }
</main>
