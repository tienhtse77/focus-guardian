<main class="min-h-screen bg-background no-scrollbar">
  <!-- Sidebar -->
  <app-sidebar
    [goals]="goals()"
    [selectedGoalId]="selectedGoalId()"
    [isHome]="isHome()"
    (goalSelected)="selectGoal($event)"
    (homeClicked)="goHome()"
    (addGoalClicked)="openAddGoal()"
    (goalsReordered)="reorderGoals($event)"
  />

  <!-- Main Content Area -->
  <div class="ml-[280px] min-h-screen">
    <!-- Header -->
    <header class="fixed top-0 right-0 w-[calc(100%-280px)] bg-background flex justify-between items-center px-12 h-20 z-40">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-outline text-lg">wb_sunny</span>
        <span class="text-sm font-light text-on-surface-variant">{{ greeting() }}</span>
      </div>
      <div class="flex items-center gap-3">
        <button (click)="showCommandPalette.set(true)"
          class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-surface-container-low text-on-surface-variant hover:bg-surface-container hover:text-primary transition-all duration-200"
          title="Command palette (Ctrl+K)">
          <span class="material-symbols-outlined text-lg">terminal</span>
          <span class="text-xs font-label text-outline" style="display:inline-flex;align-items:center;gap:2px;padding:1px 5px;background:#f2f4f3;border-radius:4px;font-size:11px;font-weight:500;">Ctrl+K</span>
        </button>
        <button (click)="toggleTheme()" class="text-on-surface-variant hover:text-primary p-2 rounded-full hover:bg-surface-container transition-all duration-200"
          [title]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
          <span class="material-symbols-outlined">{{ isDarkMode() ? 'light_mode' : 'dark_mode' }}</span>
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="pt-28 pb-20 px-12">
      @if (isHome()) {
        <app-home
          [goals]="goals()"
          (goalClicked)="selectGoal($event)"
          (addGoalClicked)="openAddGoal()"
        />
      } @else if (selectedGoal()) {
        <app-goal-view
          [goal]="selectedGoal()!"
          (editClicked)="openEditGoal(selectedGoal()!)"
          (deleteClicked)="deleteGoal(selectedGoal()!.id)"
        />
      }
    </div>
  </div>

  <!-- Goal Form Modal -->
  @if (showGoalForm()) {
    <app-goal-form [goal]="editingGoal()" (save)="saveGoal($event)" (cancel)="closeGoalForm()" />
  }

  <!-- Command Palette -->
  <app-command-palette
    [isOpen]="showCommandPalette()"
    [goals]="goals()"
    [selectedGoalId]="selectedGoalId()"
    [todoStats]="todoStats()"
    (closed)="closeCommandPalette()"
    (taskAdded)="onTaskAdded($event)"
    (goalJumped)="onGoalJumped($event)"
    (importRequested)="showCommandPalette.set(false)"
  />
</main>
